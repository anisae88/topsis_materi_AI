<!DOCTYPE html>
<html>
<head>
    <title>TOPSIS TPA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>Dataset Lokasi TPA</h2>
<a href="/tambah" class="btn btn-success mb-3">+ Tambah Data</a>
{{ data|safe }}

<hr>

<h3>Input Bobot</h3>
<form method="POST">
    <div class="row">
        <div class="col"><input name="w1" placeholder="Jarak Pemukiman" class="form-control" required></div>
        <div class="col"><input name="w2" placeholder="Jarak Air" class="form-control" required></div>
        <div class="col"><input name="w3" placeholder="Tanah" class="form-control" required></div>
        <div class="col"><input name="w4" placeholder="Akses" class="form-control" required></div>
        <div class="col"><input name="w5" placeholder="Biaya" class="form-control" required></div>
    </div>
    <br>
    <button class="btn btn-primary">Hitung</button>
</form>

<hr>

{% if norm %}
<h3>1. Normalisasi</h3>
{{ norm|safe }}

<h3>2. Pembobotan</h3>
{{ weighted|safe }}

<h3>3. Hasil Akhir</h3>
{{ result|safe }}
{% endif %}

</body>
</html>
